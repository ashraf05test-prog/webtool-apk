<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Auto Clicker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0F172A; --card:#1E293B; --border:#334155;
  --text:#E2E8F0; --sub:#94A3B8;
  --green:#22C55E; --red:#EF4444; --blue:#3B82F6;
  --yellow:#F59E0B; --purple:#8B5CF6;
}
body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* HEADER */
#hdr { background:var(--card); padding:14px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); }
#hdrTitle { flex:1; font-size:16px; font-weight:700; }
#statusDot { width:10px; height:10px; border-radius:50%; background:var(--red); flex-shrink:0; }
#statusDot.on { background:var(--green); }
#statusTxt { font-size:11px; color:var(--sub); }

/* SECTIONS */
.section { margin:12px; background:var(--card); border-radius:10px; overflow:hidden; }
.section-head { padding:10px 14px; font-size:12px; font-weight:700; color:var(--sub); border-bottom:1px solid var(--border); text-transform:uppercase; letter-spacing:.5px; }
.section-body { padding:12px; }

/* NAME GEN */
#nameBox { background:var(--bg); border-radius:8px; padding:10px 12px; margin-bottom:8px; }
#genName { font-size:16px; font-weight:700; color:var(--text); }
#genUser { font-size:12px; color:var(--sub); margin-top:2px; }
.btn-row { display:flex; gap:6px; flex-wrap:wrap; }

/* RULES */
#rulesList { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
.rule-item { background:var(--bg); border-radius:8px; padding:10px 12px; display:flex; align-items:center; gap:8px; }
.rule-trigger { flex:1; font-size:12px; font-weight:600; color:var(--text); }
.rule-action { font-size:10px; color:var(--sub); background:var(--border); padding:2px 8px; border-radius:10px; }
.rule-del { color:var(--red); font-size:16px; cursor:pointer; padding:0 4px; }

/* ADD RULE */
.inp { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-size:12px; padding:8px 10px; border-radius:8px; font-family:inherit; outline:none; margin-bottom:6px; }
select.inp { cursor:pointer; }
#typeTextWrap { display:none; }

/* BUTTONS */
.btn { font-size:12px; border:none; border-radius:8px; padding:8px 14px; cursor:pointer; font-family:inherit; font-weight:600; flex-shrink:0; }
.btn:active { opacity:.7; }
.btn-green { background:var(--green); color:#000; }
.btn-red { background:var(--red); color:#fff; }
.btn-blue { background:var(--blue); color:#fff; }
.btn-yellow { background:var(--yellow); color:#000; }
.btn-purple { background:var(--purple); color:#fff; }
.btn-gray { background:var(--border); color:var(--text); }
.btn-full { width:100%; margin-top:4px; padding:12px; font-size:14px; }

/* START/STOP */
#mainBtn { background:var(--green); color:#000; }
#mainBtn.running { background:var(--red); color:#fff; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div id="hdrTitle">⚡ Auto Clicker</div>
  <div id="statusDot"></div>
  <div id="statusTxt">Stopped</div>
</div>

<!-- NAME GENERATOR -->
<div class="section">
  <div class="section-head">🎲 Name Generator</div>
  <div class="section-body">
    <div id="nameBox">
      <div id="genName">— Press Generate —</div>
      <div id="genUser"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-purple" onclick="genName()">🎲 Generate</button>
      <button class="btn btn-gray" onclick="copyName()">📋 Copy Name</button>
      <button class="btn btn-gray" onclick="copyUser()">📋 Copy Username</button>
    </div>
  </div>
</div>

<!-- RULES -->
<div class="section">
  <div class="section-head">📋 Rules</div>
  <div class="section-body">
    <div id="rulesList"></div>

    <!-- ADD RULE FORM -->
    <input class="inp" id="rTrigger" placeholder="Trigger text (যেমন: Next, Login, Error)"/>
    <select class="inp" id="rAction" onchange="onActionChange()">
      <option value="click">Click</option>
      <option value="type">Type Text</option>
      <option value="clear">Clear & Back (Error)</option>
      <option value="back">Go Back</option>
    </select>
    <div id="typeTextWrap">
      <input class="inp" id="rTypeText" placeholder="Type করার text (নাম/username)"/>
      <div class="btn-row" style="margin-bottom:6px;">
        <button class="btn btn-gray" onclick="fillGenName()">+ Gen Name</button>
        <button class="btn btn-gray" onclick="fillGenUser()">+ Gen Username</button>
      </div>
    </div>
    <button class="btn btn-blue btn-full" onclick="addRule()">+ Add Rule</button>
  </div>
</div>

<!-- START/STOP -->
<div style="margin:12px;">
  <button class="btn btn-full" id="mainBtn" onclick="toggleService()">▶ START</button>
</div>

<script>
var rules = JSON.parse(localStorage.getItem('ac_rules') || '[]');
var running = false;
var lastName = '';
var lastUser = '';

function saveRules() { localStorage.setItem('ac_rules', JSON.stringify(rules)); }
function renderRules() {
  var el = document.getElementById('rulesList');
  if (!rules.length) { el.innerHTML = '<div style="font-size:11px;color:#94a3b8;padding:4px;">No rules yet. Add rules below.</div>'; return; }
  var h = '';
  for (var i=0; i<rules.length; i++) {
    var r = rules[i];
    var actionLabel = r.action === 'click' ? '🖱 Click' : r.action === 'type' ? '⌨ Type: '+r.typeText : r.action === 'clear' ? '🗑 Clear+Back' : '← Back';
    h += '<div class="rule-item">'
      + '<div style="flex:1;"><div class="rule-trigger">"'+r.trigger+'"</div><div class="rule-action">'+actionLabel+'</div></div>'
      + '<span class="rule-del" onclick="delRule('+i+')">✕</span>'
      + '</div>';
  }
  el.innerHTML = h;
}

function delRule(i) { rules.splice(i,1); saveRules(); renderRules(); }

function onActionChange() {
  var action = document.getElementById('rAction').value;
  document.getElementById('typeTextWrap').style.display = action === 'type' ? 'block' : 'none';
}

function addRule() {
  var trigger = document.getElementById('rTrigger').value.trim();
  var action = document.getElementById('rAction').value;
  var typeText = document.getElementById('rTypeText').value.trim();
  if (!trigger) { alert('Trigger text দাও!'); return; }
  if (action === 'type' && !typeText) { alert('Type করার text দাও!'); return; }
  rules.push({ trigger:trigger, action:action, typeText:typeText });
  saveRules(); renderRules();
  document.getElementById('rTrigger').value = '';
  document.getElementById('rTypeText').value = '';
}

function genName() {
  if (typeof Android !== 'undefined') {
    lastName = Android.generateName();
    lastUser = Android.generateUsername();
  } else {
    lastName = 'Test User';
    lastUser = 'test_user123';
  }
  document.getElementById('genName').textContent = lastName;
  document.getElementById('genUser').textContent = '@' + lastUser;
}

function copyName() {
  if (!lastName) { genName(); }
  if (typeof Android !== 'undefined') Android.copyText(lastName);
  else { try { navigator.clipboard.writeText(lastName); } catch(e){} }
}
function copyUser() {
  if (!lastUser) { genName(); }
  if (typeof Android !== 'undefined') Android.copyText(lastUser);
  else { try { navigator.clipboard.writeText(lastUser); } catch(e){} }
}
function fillGenName() {
  if (!lastName) genName();
  document.getElementById('rTypeText').value = lastName;
}
function fillGenUser() {
  if (!lastUser) genName();
  document.getElementById('rTypeText').value = lastUser;
}

function toggleService() {
  if (!running) {
    if (!rules.length) { alert('আগে কমপক্ষে একটা rule add কর!'); return; }
    if (typeof Android !== 'undefined') Android.startService(JSON.stringify(rules));
    running = true;
    document.getElementById('mainBtn').textContent = '⏹ STOP';
    document.getElementById('mainBtn').classList.add('running');
    document.getElementById('statusDot').classList.add('on');
    document.getElementById('statusTxt').textContent = 'Running';
  } else {
    if (typeof Android !== 'undefined') Android.stopService();
    running = false;
    document.getElementById('mainBtn').textContent = '▶ START';
    document.getElementById('mainBtn').classList.remove('running');
    document.getElementById('statusDot').classList.remove('on');
    document.getElementById('statusTxt').textContent = 'Stopped';
  }
}

function updateStatus() {
  var isRunning = typeof Android !== 'undefined' ? Android.isServiceRunning() : false;
  running = isRunning;
  if (isRunning) {
    document.getElementById('mainBtn').textContent = '⏹ STOP';
    document.getElementById('mainBtn').classList.add('running');
    document.getElementById('statusDot').classList.add('on');
    document.getElementById('statusTxt').textContent = 'Running';
  }
}

renderRules();
</script>
</body>
</html>
